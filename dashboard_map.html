<!DOCTYPE html>
<html>
<head>
    <title>Dashboard Map</title>
    <style>
        body { font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; background-color: #1a1a2e; color: white; margin:0; padding:20px; display:flex; flex-direction:column; align-items:center;}
        h1 { color: #f2a900; width: 80%; max-width: 1000px; margin-bottom: 20px;}
        .card { background: #16213e; padding: 30px; border-radius: 12px; box-shadow: 0 4px 15px rgba(0,0,0,0.3); width: 80%; max-width: 1000px; }
        .card h2 { margin-top: 0; color: #e94560; font-size: 1.2rem; }
        .map-container { display:flex; height: 350px; background: #0f172a; border-radius: 8px; position:relative; overflow:hidden; border: 2px solid #333; margin-top: 15px;}
        .grid-bg { position:absolute; inset:0; background-image: linear-gradient(#1e293b 1px, transparent 1px), linear-gradient(90deg, #1e293b 1px, transparent 1px); background-size: 40px 40px; opacity: 0.3; }
        .street { position:absolute; background: #334155; }
        .pin { position:absolute; width: 24px; height: 24px; border-radius: 50%; box-shadow: 0 0 10px rgba(0,0,0,0.5); border: 2px solid white; display:flex; align-items:center; justify-content:center; font-size: 10px; font-weight:bold; color:black; }
        .pin-active { background: #00ff00; box-shadow: 0 0 15px #00ff00; }
        .pin-dim { background: #ffaa00; }
        .pin-offline { background: #f44336; }
        .panel { position:absolute; right: 20px; top: 20px; background: rgba(22, 33, 62, 0.9); padding: 15px; border-radius: 8px; border: 1px solid #444; width: 200px; z-index: 10;}
    </style>
</head>
<body>
    <h1>TagoIO - Geolocation & Node Management</h1>
    <div class="card">
        <h2>Live Map View - Zone 4</h2>
        <div class="map-container">
            <div class="grid-bg"></div>
            <!-- Main Street -->
            <div class="street" style="top: 150px; left: 0; right: 0; height: 60px;"></div>
            <!-- Cross Street -->
            <div class="street" style="top: 0; bottom: 0; left: 400px; width: 60px;"></div>
            
            <!-- Nodes -->
            <div class="pin pin-dim" style="top: 115px; left: 100px;">1</div>
            <div class="pin pin-dim" style="top: 115px; left: 250px;">2</div>
            <div class="pin pin-active" style="top: 115px; left: 418px;">3</div>
            <div class="pin pin-active" style="top: 220px; left: 418px;">4</div>
            <div class="pin pin-offline" style="top: 115px; left: 700px;">5</div>
            <div class="pin pin-dim" style="top: 115px; left: 850px;">6</div>

            <div class="panel">
                <h3 style="margin-top:0; color:#4caf50; font-size:1rem;">Node Status</h3>
                <div style="margin: 10px 0; font-size:0.9rem;"><span style="color:#00ff00;">●</span> 2 Active (Motion)</div>
                <div style="margin: 10px 0; font-size:0.9rem;"><span style="color:#ffaa00;">●</span> 3 Dim (Idle)</div>
                <div style="margin: 10px 0; font-size:0.9rem;"><span style="color:#f44336;">●</span> 1 Offline / Fault</div>
            </div>
        </div>
    </div>
</body>
</html>
