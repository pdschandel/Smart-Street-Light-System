<!DOCTYPE html>
<html>
<head>
    <title>Smart Street Light Dashboard - Dim Mode</title>
    <style>
        body { font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; background-color: #1a1a2e; color: white; display:flex; flex-direction:column; align-items:center; margin:0; padding:20px; }
        h1 { color: #f2a900; }
        .grid { display: grid; grid-template-columns: repeat(3, 1fr); gap: 20px; width: 80%; max-width: 1000px; margin-top: 20px;}
        .card { background: #16213e; padding: 30px; border-radius: 12px; box-shadow: 0 4px 15px rgba(0,0,0,0.3); text-align: center; }
        .card h2 { margin-top: 0; color: #0f3460; font-size: 1.2rem; color: #e94560; }
        .value { font-size: 3rem; font-weight: bold; margin: 20px 0; }
        .status-on { color: #00ff00; text-shadow: 0 0 10px #00ff00; }
        .status-dim { color: #ffaa00; text-shadow: 0 0 10px #ffaa00; }
        .status-off { color: #888888; }
        .graph { grid-column: span 3; background: #16213e; padding: 20px; border-radius: 12px; height: 200px; position:relative; }
        .bar { position: absolute; bottom: 20px; width: 40px; background: #e94560; border-radius: 5px 5px 0 0; }
    </style>
</head>
<body>
    <h1>TagoIO - Smart Energy & Street Light Dashboard</h1>
    <div class="grid">
        <div class="card">
            <h2>Luminosity (LDR)</h2>
            <div class="value" style="color:#555">2800 <span style="font-size:1rem;font-weight:normal;color:#fff">lux</span></div>
            <div>Status: Dark</div>
        </div>
        <div class="card">
            <h2>Motion Detected (PIR)</h2>
            <div class="value status-off" style="font-size:2rem">IDLE</div>
            <div>Road Empty</div>
        </div>
        <div class="card">
            <h2>Street Light Brightness</h2>
            <div class="value status-dim">20%</div>
            <div>Power Mode: Eco Savings</div>
        </div>
        <div class="card" style="grid-column: span 3;">
            <h2>Live Power Consumption</h2>
            <div style="height:150px; display:flex; align-items:flex-end; gap:10px; justify-content:center; padding-top:20px; border-bottom:1px solid #555;">
                <div style="height:80%; width:30px; background:#e94560;"></div>
                <div style="height:90%; width:30px; background:#e94560;"></div>
                <div style="height:100%; width:30px; background:#e94560;"></div>
                <div style="height:20%; width:30px; background:#4caf50;"></div>
                <div style="height:20%; width:30px; background:#4caf50;"></div>
                <div style="height:20%; width:30px; background:#4caf50;"></div>
            </div>
            <p style="text-align:center; color:#888; margin-top:10px">Time (Last 1 Hour)</p>
        </div>
    </div>
</body>
</html>
