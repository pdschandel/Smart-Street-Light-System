<!DOCTYPE html>
<html>
<head>
    <title>Dashboard Analytics</title>
    <style>
        body { font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; background-color: #1a1a2e; color: white; margin:0; padding:20px; display:flex; flex-direction:column; align-items:center;}
        h1 { color: #f2a900; width: 80%; max-width: 1000px; margin-bottom: 20px;}
        .grid { display: grid; grid-template-columns: 1fr 1fr; gap: 20px; width: 80%; max-width: 1000px; }
        .card { background: #16213e; padding: 30px; border-radius: 12px; box-shadow: 0 4px 15px rgba(0,0,0,0.3); }
        .card h2 { margin-top: 0; color: #e94560; font-size: 1.2rem; text-align: center; }
        .chart-container { display: flex; align-items: flex-end; justify-content: space-around; height: 200px; margin-top: 20px; padding-bottom: 10px; border-bottom: 2px solid #333; }
        .bar-wrap { display: flex; flex-direction: column; justify-content: flex-end; align-items: center; width: 40px; height: 100%; }
        .bar { width: 100%; border-radius: 4px 4px 0 0; }
        .label { margin-top: 10px; font-size: 0.8rem; color: #aaa; }
        .pie { width: 180px; height: 180px; border-radius: 50%; background: conic-gradient(#e94560 0% 60%, #4caf50 60% 85%, #555 85% 100%); margin: 20px auto; }
        .legend { display: flex; flex-direction: column; gap: 10px; margin-top: 20px; }
        .legend-item { display: flex; align-items: center; gap: 10px; font-size: 0.9rem;}
        .dot { width: 12px; height: 12px; border-radius: 50%; }
    </style>
</head>
<body>
    <h1>TagoIO - System Analytics & Energy Savings</h1>
    <div class="grid">
        <div class="card">
            <h2>Daily Energy Consumption (kWh) vs Baseline</h2>
            <div class="chart-container">
                <div class="bar-wrap"><div class="bar" style="height: 90%; background: #555; opacity:0.5;"></div><div class="bar" style="height: 40%; background: #4caf50; position:absolute;"></div><div class="label">Mon</div></div>
                <div class="bar-wrap"><div class="bar" style="height: 85%; background: #555; opacity:0.5;"></div><div class="bar" style="height: 35%; background: #4caf50; position:absolute;"></div><div class="label">Tue</div></div>
                <div class="bar-wrap"><div class="bar" style="height: 80%; background: #555; opacity:0.5;"></div><div class="bar" style="height: 38%; background: #4caf50; position:absolute;"></div><div class="label">Wed</div></div>
                <div class="bar-wrap"><div class="bar" style="height: 95%; background: #555; opacity:0.5;"></div><div class="bar" style="height: 45%; background: #4caf50; position:absolute;"></div><div class="label">Thu</div></div>
                <div class="bar-wrap"><div class="bar" style="height: 90%; background: #555; opacity:0.5;"></div><div class="bar" style="height: 42%; background: #4caf50; position:absolute;"></div><div class="label">Fri</div></div>
            </div>
            <div style="text-align:center; margin-top:15px; font-size: 0.9rem;">
                <span style="color:#4caf50; font-weight:bold;">Green: Smart Mode</span> | <span style="color:#888;">Grey: Traditional Mode</span>
            </div>
        </div>
        <div class="card">
            <h2>Light Status Distribution (Last 24h)</h2>
            <div style="display:flex; align-items:center; justify-content:center; gap: 40px;">
                <div class="pie"></div>
                <div class="legend">
                    <div class="legend-item"><div class="dot" style="background:#e94560;"></div>DIM (20%) - 60%</div>
                    <div class="legend-item"><div class="dot" style="background:#4caf50;"></div>ACTIVE (100%) - 25%</div>
                    <div class="legend-item"><div class="dot" style="background:#555;"></div>OFF (Day) - 15%</div>
                </div>
            </div>
        </div>
    </div>
</body>
</html>
